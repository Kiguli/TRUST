name: Deploy Flask project

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Configure SSH

        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}

        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/github
          chmod 600 ~/.ssh/github
          cat >> ~/.ssh/config <<EOF
          Host target 
            Hostname $SSH_HOST
            User $SSH_USER
            Port 2202
            IdentityFile ~/.ssh/github
            LogLevel ERROR
            StrictHostKeyChecking no
          EOF

      - name: Update app
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh target << 'EOF'
            cd /srv/trust.tgo.dev/current
            git reset --hard HEAD
            git pull
            cd ..
            source venv/bin/activate

            # Verify Python version
            python_version=$(python -V 2>&1 | cut -d' ' -f2)
            if [[ ! "$python_version" =~ ^3\.12\.10 ]]; then
              echo "Warning: Python version is $python_version, expected 3.12.10"
              echo "Please update Python using pyenv: pyenv install 3.12.10"
            fi

            # Install dependencies using Poetry
            pip install --quiet poetry
            cd current
            poetry install --only main --no-interaction

            # Build frontend
            cd vite
            source ~/.zshrc
            npm ci
            npm run build
          EOF

      - name: Reload NGINX
        run: |
          ssh target << 'EOF'
            sudo nginx -s reload
          EOF